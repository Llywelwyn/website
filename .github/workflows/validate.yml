name: Validate content
on:
  push:
    paths:
      - 'www/content/**'
      - 'www/public/*.txt'
      - 'www/public/config.yaml'
  pull_request:
    paths:
      - 'www/content/**'
      - 'www/public/*.txt'
      - 'www/public/config.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:www
